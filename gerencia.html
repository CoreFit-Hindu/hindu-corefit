<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hindú CoreFit — Gerencia</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --green:#3a9e3f;--green-dark:#2d7a31;--green-light:#4caf50;
  --green-glow:rgba(58,158,63,0.3);--red:#cc2222;--amber:#f59e0b;
  --bg:#0d1117;--bg2:#131920;--bg3:#1a2230;
  --surface:rgba(255,255,255,0.055);--surface2:rgba(255,255,255,0.09);
  --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.16);
  --text:#e4e8f0;--text2:#8a95a8;--text3:#5a6478;
  --font-display:'Rajdhani',sans-serif;--font-body:'Nunito',sans-serif;
  --radius:12px;--radius-sm:8px;
}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;}

nav{position:sticky;top:0;z-index:50;background:rgba(13,17,23,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;height:58px;}
.nav-brand{font-family:var(--font-display);font-size:1.35rem;font-weight:700;letter-spacing:0.03em;display:flex;align-items:center;gap:10px;}
.nav-shield{width:28px;height:32px;}
.nav-tabs{display:flex;gap:4px;}
.nav-tab{background:none;border:none;font-family:var(--font-body);font-size:0.82rem;font-weight:600;color:var(--text2);padding:6px 14px;border-radius:6px;cursor:pointer;transition:all 0.18s;}
.nav-tab:hover{color:var(--text);background:var(--surface);}
.nav-tab.active{color:var(--green-light);background:rgba(58,158,63,0.12);}
.btn-sync{background:none;border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text2);font-size:0.8rem;font-family:var(--font-body);padding:6px 12px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all 0.18s;}
.btn-sync:hover{border-color:var(--green);color:var(--green-light);}
.btn-sync svg{width:14px;height:14px;}
.btn-sync.spinning svg{animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

main{max-width:1100px;margin:0 auto;padding:2rem 1.5rem 4rem;}

.page-title{font-family:var(--font-display);font-size:1.6rem;font-weight:700;margin-bottom:1.5rem;display:flex;align-items:center;gap:10px;}
.page-title svg{width:24px;height:24px;color:var(--green-light);}

/* STATS */
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:2rem;}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;}
.stat-label{font-size:0.75rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;}
.stat-val{font-family:var(--font-display);font-size:2rem;font-weight:700;line-height:1;}
.stat-val.green{color:var(--green-light);}
.stat-val.amber{color:var(--amber);}

/* SECCIONES */
.section{margin-bottom:2.5rem;}
.section-title{font-family:var(--font-display);font-size:1.15rem;font-weight:700;margin-bottom:1rem;display:flex;align-items:center;gap:8px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.section-title svg{width:18px;height:18px;color:var(--green-light);}

/* TRANSFERENCIAS PENDIENTES */
.tabla-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
table{width:100%;border-collapse:collapse;}
thead tr{background:var(--bg3);border-bottom:1px solid var(--border2);}
thead th{padding:10px 14px;text-align:left;font-size:0.72rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;white-space:nowrap;}
tbody tr{border-bottom:1px solid var(--border);transition:background 0.15s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--surface);}
tbody td{padding:10px 14px;font-size:0.85rem;color:var(--text2);}
tbody td.nombre{color:var(--text);font-weight:600;}
.badge-pendiente{display:inline-flex;align-items:center;gap:5px;font-size:0.72rem;font-weight:700;padding:3px 10px;border-radius:20px;background:rgba(245,158,11,0.15);color:#fcd34d;}
.badge-validado{display:inline-flex;align-items:center;gap:5px;font-size:0.72rem;font-weight:700;padding:3px 10px;border-radius:20px;background:rgba(76,175,80,0.15);color:#81c784;}
.badge-dot{width:6px;height:6px;border-radius:50%;background:currentColor;}
.monto-val{font-family:var(--font-display);font-size:1rem;font-weight:700;color:var(--green-light);}
.btn-accion{background:none;border:1px solid var(--border);border-radius:6px;color:var(--text2);font-size:0.75rem;font-family:var(--font-body);padding:4px 10px;cursor:pointer;transition:all 0.18s;margin-right:4px;}
.btn-accion:hover{border-color:var(--green);color:var(--green-light);}
.btn-accion.rechazar:hover{border-color:var(--red);color:#ef9a9a;}

/* COBRANZAS POR INSTRUCTOR */
.instructor-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;}
.inst-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.inst-card-header{background:var(--bg3);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.inst-nombre{font-family:var(--font-display);font-size:1rem;font-weight:700;}
.inst-total{font-family:var(--font-display);font-size:1.4rem;font-weight:700;color:var(--green-light);}
.inst-subtotal{font-size:0.72rem;color:var(--text3);}
.inst-tabla{width:100%;border-collapse:collapse;}
.inst-tabla td{padding:8px 16px;font-size:0.82rem;color:var(--text2);border-bottom:1px solid var(--border);}
.inst-tabla tr:last-child td{border-bottom:none;}
.inst-tabla td:first-child{color:var(--text);}
.inst-tabla td:last-child{text-align:right;font-family:var(--font-display);font-weight:700;color:var(--green-light);}
.inst-empty{padding:16px;text-align:center;color:var(--text3);font-size:0.85rem;}

/* FILTROS */
.toolbar{display:flex;gap:10px;margin-bottom:1rem;flex-wrap:wrap;align-items:center;}
.filter-sel{height:40px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0 12px;font-family:var(--font-body);font-size:0.85rem;color:var(--text2);outline:none;cursor:pointer;}
.filter-sel option{background:#1a2230;}

.state-msg{text-align:center;padding:3rem;color:var(--text3);font-size:0.9rem;}
.loader{width:32px;height:32px;border:3px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@media(max-width:640px){.stats-bar{grid-template-columns:repeat(2,1fr);}.nav-tabs{display:none;}main{padding:1.25rem 1rem 3rem;}}
</style>
</head>
<body>

<nav>
  <div class="nav-brand">
    <svg class="nav-shield" viewBox="0 0 28 32" fill="none">
      <path d="M14 1L1 6.5V17c0 7.5 5.5 13 13 16 7.5-3 13-8.5 13-16V6.5L14 1z" fill="#2d6e32"/>
      <text x="14" y="16" text-anchor="middle" font-family="Rajdhani,sans-serif" font-weight="700" font-size="6" fill="white" letter-spacing="0.5">HINDÚ</text>
      <rect x="5" y="18" width="18" height="1.5" fill="white" opacity="0.8"/>
      <rect x="5" y="21" width="18" height="1.5" fill="white" opacity="0.5"/>
    </svg>
    HINDÚ <span style="color:var(--text2);font-weight:500;margin:0 4px">—</span> CoreFit
  </div>
    <div class="nav-tabs">
    <button class="nav-tab" onclick="location.href='instructores.html'">Instructores</button>
    <button class="nav-tab" onclick="location.href='alumnos.html'">Alumnos</button>
    <button class="nav-tab" onclick="location.href='membresias.html'">Membresías</button>
    <button class="nav-tab" onclick="location.href='asistencia.html'">Asistencia</button>
    <button class="nav-tab" onclick="location.href='rutinas.html'">Rutinas</button>
    <button class="nav-tab" onclick="location.href='gerencia.html'">Gerencia</button>
  </div>
  <button class="btn-sync" id="btnSync" onclick="cargarDatos(true)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
    Actualizar
  </button>
</nav>

<main>

  <div class="page-title">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    Panel de Gerencia
  </div>

  <!-- Stats generales -->
  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-label">Total recaudado</div>
      <div class="stat-val green" id="st-total">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Este mes</div>
      <div class="stat-val green" id="st-mes">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Transferencias pendientes</div>
      <div class="stat-val amber" id="st-transf">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Pagos pendientes ($)</div>
      <div class="stat-val amber" id="st-monto-pend">—</div>
    </div>
  </div>

  <!-- Transferencias pendientes -->
  <div class="section">
    <div class="section-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
      Transferencias pendientes de validación
    </div>
    <div class="tabla-wrap">
      <table>
        <thead>
          <tr>
            <th>Alumno</th>
            <th>DNI</th>
            <th>Tipo</th>
            <th>Monto</th>
            <th>Comprobante</th>
            <th>Fecha</th>
            <th>Instructor</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="transfBody">
          <tr><td colspan="8"><div class="state-msg"><div class="loader"></div>Cargando…</div></td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Cobranzas por instructor -->
  <div class="section">
    <div class="section-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      Cobranzas por instructor
    </div>
    <div class="toolbar">
      <select class="filter-sel" id="filtroMes" onchange="renderCobranzas()">
        <option value="">Todos los meses</option>
      </select>
    </div>
    <div class="instructor-cards" id="cobranzasGrid">
      <div class="state-msg"><div class="loader"></div>Cargando…</div>
    </div>
  </div>

</main>

<script>
const WORKER_MEMBRESIAS  = 'https://hindu-corefit-proxy.edu-gonza.workers.dev/membresias';
const WORKER_INSTRUCTORES= 'https://hindu-corefit-proxy.edu-gonza.workers.dev/instructores';
const APPS_SCRIPT_URL    = 'https://hindu-corefit-proxy.edu-gonza.workers.dev/api/membresias';

let pagos = [];
let instructores = [];

function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const header = parseLine(lines[0]);
  return lines.slice(1).map(line => {
    const vals = parseLine(line);
    const obj = {};
    header.forEach((h,i) => obj[h.trim()] = String(vals[i]||'').trim());
    return obj;
  }).filter(r => Object.values(r).some(v=>v));
}
function parseLine(line) {
  const result=[]; let cur='', inQ=false;
  for(let i=0;i<line.length;i++){const c=line[i];if(c==='"'){inQ=!inQ;}else if(c===','&&!inQ){result.push(cur);cur='';}else cur+=c;}
  result.push(cur);
  return result.map(s=>s.trim().replace(/^"|"$/g,''));
}
function getVal(row,...keys){for(const k of keys){if(row[k]!==undefined&&row[k]!=='')return row[k];}return '';}

async function cargarDatos(manual=false) {
  const btn = document.getElementById('btnSync');
  btn.classList.add('spinning');
  try {
    const [respMem, respInst] = await Promise.all([
      fetch(WORKER_MEMBRESIAS),
      fetch(WORKER_INSTRUCTORES)
    ]);
    pagos        = parseCSV(await respMem.text());
    instructores = parseCSV(await respInst.text());
    actualizarStats();
    renderTransferencias();
    poblarFiltroMes();
    renderCobranzas();
    if (manual) mostrarToast('✓ Datos actualizados');
  } catch(e) {
    mostrarToast('Error: ' + e.message, true);
  } finally {
    btn.classList.remove('spinning');
  }
}

function actualizarStats() {
  const validados = pagos.filter(r => getVal(r,'Estado').toLowerCase() === 'validado');
  const pendTransf = pagos.filter(r => getVal(r,'Estado').toLowerCase() === 'pendiente' && getVal(r,'Forma de Pago').toLowerCase() === 'transferencia');
  
  const ahora = new Date();
  const inicioMes = new Date(ahora.getFullYear(), ahora.getMonth(), 1);
  
  const totalRec = validados.reduce((s,r) => s + (parseFloat(getVal(r,'Monto'))||0), 0);
  const mesMonto = validados.filter(r => new Date(getVal(r,'Fecha de Pago')) >= inicioMes)
    .reduce((s,r) => s + (parseFloat(getVal(r,'Monto'))||0), 0);
  const montoPend = pendTransf.reduce((s,r) => s + (parseFloat(getVal(r,'Monto'))||0), 0);

  document.getElementById('st-total').textContent      = '$' + totalRec.toLocaleString('es-AR');
  document.getElementById('st-mes').textContent        = '$' + mesMonto.toLocaleString('es-AR');
  document.getElementById('st-transf').textContent     = pendTransf.length;
  document.getElementById('st-monto-pend').textContent = '$' + montoPend.toLocaleString('es-AR');
}

function renderTransferencias() {
  const tbody = document.getElementById('transfBody');
  const pendientes = pagos.filter(r =>
    getVal(r,'Estado').toLowerCase() === 'pendiente' &&
    getVal(r,'Forma de Pago').toLowerCase() === 'transferencia'
  );

  if (!pendientes.length) {
    tbody.innerHTML = '<tr><td colspan="8"><div class="state-msg">No hay transferencias pendientes. ✓</div></td></tr>';
    return;
  }

  tbody.innerHTML = pendientes.map((r,i) => {
    const nombre = getVal(r,'Nombre Alumno');
    const dni    = getVal(r,'DNI del Alumno');
    const tipo   = getVal(r,'Tipo de Membresia');
    const monto  = parseFloat(getVal(r,'Monto')||0);
    const comp   = getVal(r,'Comprobante');
    const fecha  = getVal(r,'Fecha de Pago');
    const dniInst= getVal(r,'DNI del Instructor');
    const inst   = instructores.find(ins => String(ins['DNI']||'').trim() === dniInst);
    const instNombre = inst ? String(inst['Nombre y Apellido']||'').trim() : (dniInst||'—');
    const idxReal = pagos.indexOf(r);

    return `<tr>
      <td class="nombre">${nombre||'—'}</td>
      <td>${dni}</td>
      <td>${tipo}</td>
      <td><span class="monto-val">$${monto.toLocaleString('es-AR')}</span></td>
      <td>${comp ? `<a href="${comp}" target="_blank" style="color:var(--green-light);font-size:0.8rem">📎 Ver</a>` : '—'}</td>
      <td>${fecha}</td>
      <td>${instNombre}</td>
      <td>
        <button class="btn-accion" onclick="validarPago(${idxReal},'Validado')">✓ Validar</button>
        <button class="btn-accion rechazar" onclick="validarPago(${idxReal},'Rechazado')">✗ Rechazar</button>
      </td>
    </tr>`;
  }).join('');
}

async function validarPago(idx, nuevoEstado) {
  const r = pagos[idx];
  const nombre = getVal(r,'Nombre Alumno');
  const dni    = getVal(r,'DNI del Alumno');
  const fecha  = getVal(r,'Fecha de Pago');
  const forma  = getVal(r,'Forma de Pago');
  if (!confirm(`¿${nuevoEstado} el pago de ${nombre}?`)) return;
  mostrarToast('Guardando…');
  try {
    const params = new URLSearchParams({ action:'validar', dni, fecha, estado:nuevoEstado, forma });
    const resp = await fetch(APPS_SCRIPT_URL + '?' + params.toString());
    const result = await resp.json();
    if (result.ok) {
      pagos[idx]['Estado'] = nuevoEstado;
      actualizarStats();
      renderTransferencias();
      renderCobranzas();
      mostrarToast('✓ Pago ' + nuevoEstado.toLowerCase() + ' correctamente');
    } else {
      mostrarToast('Error al validar', true);
    }
  } catch(e) {
    mostrarToast('Error: ' + e.message, true);
  }
}

// ── Cobranzas por instructor ──
function poblarFiltroMes() {
  const meses = [...new Set(pagos.map(r => {
    const f = getVal(r,'Fecha de Pago');
    if (!f) return null;
    const d = new Date(f);
    if (isNaN(d)) return null;
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
  }).filter(Boolean))].sort().reverse();

  const sel = document.getElementById('filtroMes');
  const actual = sel.value;
  sel.innerHTML = '<option value="">Todos los meses</option>' +
    meses.map(m => {
      const [y,mo] = m.split('-');
      const nombre = new Date(y, mo-1, 1).toLocaleDateString('es-AR',{month:'long',year:'numeric'});
      return `<option value="${m}">${nombre}</option>`;
    }).join('');
  if (actual) sel.value = actual;
}

function renderCobranzas() {
  const mesFilter = document.getElementById('filtroMes').value;
  const grid = document.getElementById('cobranzasGrid');

  // Filtrar pagos validados
  let base = pagos.filter(r => getVal(r,'Estado').toLowerCase() === 'validado');
  if (mesFilter) {
    base = base.filter(r => {
      const f = new Date(getVal(r,'Fecha de Pago'));
      if (isNaN(f)) return false;
      const m = f.getFullYear() + '-' + String(f.getMonth()+1).padStart(2,'0');
      return m === mesFilter;
    });
  }

  // Agrupar por instructor
  const porInstructor = {};
  base.forEach(r => {
    const dniInst = getVal(r,'DNI del Instructor') || 'sin-asignar';
    if (!porInstructor[dniInst]) porInstructor[dniInst] = [];
    porInstructor[dniInst].push(r);
  });

  if (!Object.keys(porInstructor).length) {
    grid.innerHTML = '<div class="state-msg">No hay cobranzas para el período seleccionado.</div>';
    return;
  }

  grid.innerHTML = Object.entries(porInstructor).map(([dniInst, cobros]) => {
    const inst = instructores.find(i => String(i['DNI']||'').trim() === dniInst);
    const instNombre = inst ? String(inst['Nombre y Apellido']||'').trim() : 'Sin asignar';
    const total = cobros.reduce((s,r) => s + (parseFloat(getVal(r,'Monto'))||0), 0);
    const efectivo = cobros.filter(r=>getVal(r,'Forma de Pago').toLowerCase()==='efectivo').reduce((s,r)=>s+(parseFloat(getVal(r,'Monto'))||0),0);
    const transf   = cobros.filter(r=>getVal(r,'Forma de Pago').toLowerCase()==='transferencia').reduce((s,r)=>s+(parseFloat(getVal(r,'Monto'))||0),0);

    // Agrupar por alumno
    const porAlumno = {};
    cobros.forEach(r => {
      const nombre = getVal(r,'Nombre Alumno') || getVal(r,'DNI del Alumno');
      if (!porAlumno[nombre]) porAlumno[nombre] = 0;
      porAlumno[nombre] += parseFloat(getVal(r,'Monto'))||0;
    });

    return `<div class="inst-card">
      <div class="inst-card-header">
        <div>
          <div class="inst-nombre">${instNombre}</div>
          <div class="inst-subtotal">Efectivo $${efectivo.toLocaleString('es-AR')} · Transf $${transf.toLocaleString('es-AR')}</div>
        </div>
        <div class="inst-total">$${total.toLocaleString('es-AR')}</div>
      </div>
      <table class="inst-tabla">
        ${Object.entries(porAlumno).map(([nombre, monto]) =>
          `<tr><td>${nombre}</td><td>$${monto.toLocaleString('es-AR')}</td></tr>`
        ).join('')}
      </table>
    </div>`;
  }).join('');
}

function mostrarToast(msg, isError=false) {
  let t = document.getElementById('toast-gl');
  if (!t) { t=document.createElement('div');t.id='toast-gl';t.style.cssText='position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(10px);padding:10px 20px;border-radius:10px;font-size:.85rem;opacity:0;pointer-events:none;transition:all .3s;z-index:999;white-space:nowrap;font-family:var(--font-body)';document.body.appendChild(t); }
  t.style.background=isError?'#2c1e1e':'#1e2c1e';
  t.style.border=isError?'1px solid var(--red)':'1px solid var(--green)';
  t.style.color=isError?'#ef9a9a':'#a5d6a7';
  t.textContent=msg;t.style.opacity='1';t.style.transform='translateX(-50%) translateY(0)';
  setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(-50%) translateY(10px)';},3000);
}

// Verificar acceso
const user = JSON.parse(sessionStorage.getItem('hcf_user')||'{}');
if (!user.dni || !String(user.especialidad||'').toLowerCase().includes('gerencia')) {
  window.location.href = 'index.html';
}

cargarDatos();
</script>

<script>
// Marcar pestaña activa según la página actual
(function() {
  const page = window.location.pathname.split('/').pop() || 'index.html';
  const map = {
    'instructores.html': 'Instructores',
    'alumnos.html': 'Alumnos',
    'membresias.html': 'Membresías',
    'asistencia.html': 'Asistencia',
    'rutinas.html': 'Rutinas',
    'gerencia.html': 'Gerencia',
  };
  const activo = map[page];
  document.querySelectorAll('.nav-tab').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.trim() === activo);
  });
})();
</script>
</body>
