<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hindú CoreFit — Mi Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green: #3a9e3f; --green-dark: #2d7a31; --green-light: #4caf50;
  --green-glow: rgba(58,158,63,0.3); --red: #cc2222;
  --bg: #0d1117; --bg2: #131920; --bg3: #1a2230;
  --surface: rgba(255,255,255,0.055); --surface2: rgba(255,255,255,0.09);
  --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.16);
  --text: #e4e8f0; --text2: #8a95a8; --text3: #5a6478;
  --font-display: 'Rajdhani', sans-serif; --font-body: 'Nunito', sans-serif;
  --radius: 12px; --radius-sm: 8px;
}
html { font-size: 16px; }
body { font-family: var(--font-body); background: var(--bg); color: var(--text); min-height: 100vh; }

/* NAV */
nav {
  position: sticky; top: 0; z-index: 50;
  background: rgba(13,17,23,0.92); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 1.5rem; height: 58px;
}
.nav-brand { font-family: var(--font-display); font-size: 1.35rem; font-weight: 700; letter-spacing: 0.03em; display: flex; align-items: center; gap: 10px; }
.nav-shield { width: 28px; height: 32px; }
.nav-user { display: flex; align-items: center; gap: 10px; }
.nav-user-name { font-size: 0.85rem; color: var(--text2); }
.btn-logout { background: none; border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text3); font-size: 0.8rem; font-family: var(--font-body); padding: 6px 12px; cursor: pointer; transition: all 0.18s; }
.btn-logout:hover { border-color: var(--red); color: #ef9a9a; }

/* MAIN */
main { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

/* PERFIL CARD */
.perfil-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 1.5rem;
  display: flex; align-items: center; gap: 20px;
  margin-bottom: 2rem; animation: fadeUp 0.4s ease both;
}
.perfil-avatar {
  width: 72px; height: 72px; border-radius: 50%; flex-shrink: 0;
  background: rgba(58,158,63,0.2); color: #81c784;
  font-family: var(--font-display); font-size: 1.5rem; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.perfil-avatar img { width: 100%; height: 100%; object-fit: cover; }
.perfil-info h2 { font-family: var(--font-display); font-size: 1.4rem; font-weight: 700; margin-bottom: 4px; }
.perfil-info p { font-size: 0.85rem; color: var(--text2); }
.perfil-badge {
  margin-left: auto; text-align: center; padding: 0.75rem 1.25rem;
  background: rgba(58,158,63,0.1); border: 1px solid rgba(58,158,63,0.2);
  border-radius: var(--radius);
}
.perfil-badge .act { font-family: var(--font-display); font-size: 1.1rem; font-weight: 700; color: var(--green-light); }
.perfil-badge .hor { font-size: 0.75rem; color: var(--text3); margin-top: 2px; }

/* SECCIONES */
.section { margin-bottom: 2rem; animation: fadeUp 0.4s ease both; }
.section:nth-child(2) { animation-delay: 0.1s; }
.section:nth-child(3) { animation-delay: 0.15s; }
.section:nth-child(4) { animation-delay: 0.2s; }

.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
.section-title { font-family: var(--font-display); font-size: 1.1rem; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 8px; }
.section-title svg { width: 18px; height: 18px; color: var(--green-light); }

/* MEMBRESIA */
.membresia-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 1.25rem 1.5rem;
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 1rem;
}
.mem-estado { display: flex; align-items: center; gap: 10px; }
.mem-dot { width: 10px; height: 10px; border-radius: 50%; }
.mem-dot.activa { background: var(--green-light); box-shadow: 0 0 8px var(--green-light); }
.mem-dot.vencida { background: #ef5350; }
.mem-dot.pendiente { background: #ffa726; }
.mem-label { font-size: 0.9rem; font-weight: 600; }
.mem-detalle { font-size: 0.8rem; color: var(--text3); margin-top: 2px; }
.mem-monto { font-family: var(--font-display); font-size: 1.8rem; font-weight: 700; color: var(--green-light); }
.mem-vence { font-size: 0.75rem; color: var(--text3); text-align: right; }

/* RUTINA */
.rutina-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
.rutina-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 1rem 1.25rem;
  transition: border-color 0.2s;
}
.rutina-card:hover { border-color: var(--border2); }
.rutina-dia { font-size: 0.7rem; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
.rutina-nombre { font-family: var(--font-display); font-size: 1rem; font-weight: 700; color: var(--text); margin-bottom: 8px; }
.rutina-ejercicios { list-style: none; }
.rutina-ejercicios li { font-size: 0.82rem; color: var(--text2); padding: 4px 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
.rutina-ejercicios li:last-child { border-bottom: none; }
.rutina-ejercicios li span { color: var(--text3); font-size: 0.78rem; }
.rutina-vacia { font-size: 0.88rem; color: var(--text3); text-align: center; padding: 2rem; }

/* ACTIVIDADES */
.actividades-list { display: flex; flex-direction: column; gap: 10px; }
.actividad-item {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 0.85rem 1.25rem;
  display: flex; align-items: center; gap: 14px;
}
.act-icon { width: 38px; height: 38px; border-radius: 50%; background: rgba(58,158,63,0.15); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.act-icon svg { width: 18px; height: 18px; color: var(--green-light); }
.act-info { flex: 1; }
.act-nombre { font-size: 0.92rem; font-weight: 600; color: var(--text); }
.act-desc { font-size: 0.78rem; color: var(--text3); margin-top: 2px; }
.act-horario { font-size: 0.8rem; color: var(--text2); font-weight: 600; white-space: nowrap; }

/* ASISTENCIA ALUMNO */
.asist-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:8px; }
.asist-dia { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius-sm); padding:10px 12px; }
.asist-dia.presente { border-color:rgba(76,175,80,0.3); background:rgba(76,175,80,0.05); }
.asist-fecha { font-size:0.72rem; color:var(--text3); margin-bottom:4px; }
.asist-act { font-size:0.82rem; font-weight:600; color:var(--text); margin-bottom:2px; }
.asist-turno { font-size:0.72rem; color:var(--text2); }
.asist-hora { font-size:0.68rem; color:var(--text3); margin-top:4px; }
.asist-badge { display:inline-block; font-size:0.65rem; font-weight:700; padding:2px 6px; border-radius:10px; background:rgba(76,175,80,0.15); color:#81c784; margin-top:6px; }
.asist-stats { display:flex; gap:16px; margin-bottom:12px; }
.asist-stat { font-size:0.82rem; color:var(--text2); }
.asist-stat strong { font-family:var(--font-display); font-size:1.2rem; color:var(--green-light); margin-right:4px; }

/* HISTORIAL */
.historial-tabla { width:100%; border-collapse:collapse; background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
.historial-tabla thead tr { background:var(--bg3); border-bottom:1px solid var(--border2); }
.historial-tabla thead th { padding:8px 14px; text-align:left; font-size:0.7rem; font-weight:700; color:var(--text3); text-transform:uppercase; letter-spacing:0.08em; }
.historial-tabla tbody tr { border-bottom:1px solid var(--border); }
.historial-tabla tbody tr:last-child { border-bottom:none; }
.historial-tabla tbody td { padding:10px 14px; font-size:0.84rem; color:var(--text2); }
.h-monto { font-family:var(--font-display); font-weight:700; color:var(--green-light); }
.h-badge { display:inline-flex; align-items:center; gap:4px; font-size:0.7rem; font-weight:700; padding:2px 8px; border-radius:20px; }
.h-validado  { background:rgba(76,175,80,0.15);  color:#81c784; }
.h-pendiente { background:rgba(245,158,11,0.15); color:#fcd34d; }
.h-rechazado { background:rgba(239,83,80,0.15);  color:#ef9a9a; }
.h-dot { width:5px; height:5px; border-radius:50%; background:currentColor; }

/* EMPTY */
.empty-msg { text-align: center; padding: 2rem; color: var(--text3); font-size: 0.88rem; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); }

@keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

@media (max-width: 640px) {
  .perfil-badge { margin-left: 0; width: 100%; }
  .perfil-card { flex-wrap: wrap; }
  main { padding: 1.25rem 1rem 3rem; }
}
</style>
</head>
<body>

<nav>
  <div class="nav-brand">
    <svg class="nav-shield" viewBox="0 0 28 32" fill="none">
      <path d="M14 1L1 6.5V17c0 7.5 5.5 13 13 16 7.5-3 13-8.5 13-16V6.5L14 1z" fill="#2d6e32"/>
      <text x="14" y="16" text-anchor="middle" font-family="Rajdhani,sans-serif" font-weight="700" font-size="6" fill="white" letter-spacing="0.5">HINDÚ</text>
      <rect x="5" y="18" width="18" height="1.5" fill="white" opacity="0.8"/>
      <rect x="5" y="21" width="18" height="1.5" fill="white" opacity="0.5"/>
    </svg>
    HINDÚ <span style="color:var(--text2);font-weight:500;margin:0 4px">—</span> CoreFit
  </div>
  <div class="nav-user">
    <span class="nav-user-name" id="navNombre"></span>
    <button class="btn-logout" onclick="logout()">Salir</button>
  </div>
</nav>

<main>

  <!-- Perfil -->
  <div class="perfil-card">
    <div class="perfil-avatar" id="perfilAvatar"></div>
    <div class="perfil-info">
      <h2 id="perfilNombre" style="font-size:1.6rem;margin-bottom:6px">Cargando…</h2>
      <p id="perfilDni" style="font-size:0.82rem;color:var(--text3)"></p>
      <p id="perfilHistorial" style="margin-top:6px;font-size:0.82rem;color:var(--text2)"></p>
    </div>
    <div class="perfil-badge" style="min-width:200px">
      <div class="act" id="perfilActividad" style="font-size:1.2rem;margin-bottom:6px">—</div>
      <div class="hor" id="perfilHorario" style="font-size:0.75rem;line-height:1.5">—</div>
    </div>
  </div>

  <!-- Membresía -->
  <div class="section">
    <div class="section-header">
      <div class="section-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
        Membresía
      </div>
    </div>
    <div class="membresia-card" id="membresiaCard">
      <div class="mem-estado">
        <div class="mem-dot pendiente" id="mem-dot"></div>
        <div>
          <div class="mem-label" id="mem-label">Cargando…</div>
          <div class="mem-detalle" id="mem-detalle"></div>
        </div>
      </div>
      <div>
        <div class="mem-monto" id="mem-monto"></div>
        <div class="mem-vence" id="mem-vence"></div>
      </div>
    </div>
  </div>

  <!-- Historial de pagos -->
  <div class="section">
    <div class="section-header">
      <div class="section-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        Historial de pagos (últimos 3 meses)
      </div>
    </div>
    <div id="historialPagos"></div>
  </div>

  <!-- Rutina -->
  <div class="section">
    <div class="section-header">
      <div class="section-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
        Mi Rutina
      </div>
    </div>
    <div class="rutina-grid" id="rutinaGrid">
      <div class="empty-msg">Tu instructor aún no cargó tu rutina.<br>Consultale en tu próxima clase.</div>
    </div>
  </div>

  <!-- Asistencia -->
  <div class="section">
    <div class="section-header">
      <div class="section-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        Mi Asistencia
      </div>
      <div style="display:flex;gap:8px">
        <button onclick="verAsistencia('semana')" id="btn-semana" style="background:rgba(58,158,63,0.15);border:1px solid rgba(58,158,63,0.3);border-radius:6px;color:#81c784;font-size:0.78rem;font-family:var(--font-body);padding:4px 12px;cursor:pointer;">Esta semana</button>
        <button onclick="verAsistencia('mes')" id="btn-mes" style="background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text2);font-size:0.78rem;font-family:var(--font-body);padding:4px 12px;cursor:pointer;">Este mes</button>
      </div>
    </div>
    <div id="asistenciaAlumno"></div>
  </div>

</main>

<script>
const WORKER_ALUMNOS     = 'https://hindu-corefit-proxy.edu-gonza.workers.dev/alumnos';
const WORKER_ASISTENCIA2 = 'https://hindu-corefit-proxy.edu-gonza.workers.dev/asistencia';
const WORKER_MEMBRESIAS = 'https://hindu-corefit-proxy.edu-gonza.workers.dev/membresias';

function iniciales(n) {
  const p = (n||'').trim().split(' ').filter(Boolean);
  return p.length >= 2 ? (p[0][0]+p[1][0]).toUpperCase() : (n||'?').slice(0,2).toUpperCase();
}
function fotoUrl(url) {
  if (!url) return '';
  const m = url.match(/[?&]id=([-\w]+)/);
  if (m) return 'https://drive.google.com/thumbnail?id=' + m[1] + '&sz=w200';
  return url;
}
function imgErr(el,ini){el.style.display='none';el.parentElement.textContent=ini;}
function logout() { sessionStorage.removeItem('hcf_user'); window.location.href='index.html'; }

function parseCSV(text) {
  const lines=text.trim().split('\n'); if(lines.length<2) return [];
  const header=parseLine(lines[0]);
  return lines.slice(1).map(line=>{const vals=parseLine(line);const obj={};header.forEach((h,i)=>obj[h.trim()]=String(vals[i]||'').trim());return obj;}).filter(r=>Object.values(r).some(v=>v));
}
function parseLine(line) {
  const result=[]; let cur='', inQ=false;
  for(let i=0;i<line.length;i++){const c=line[i];if(c==='"'){inQ=!inQ;}else if(c===','&&!inQ){result.push(cur);cur='';}else cur+=c;}
  result.push(cur);
  return result.map(s=>s.trim().replace(/^"|"$/g,''));
}

async function init() {
  // Recuperar sesión
  const sesion = sessionStorage.getItem('hcf_user');
  if (!sesion) { window.location.href='index.html'; return; }
  const user = JSON.parse(sesion);
  if (user.rol !== 'alumno') { window.location.href='instructores.html'; return; }

  document.getElementById('navNombre').textContent = user.nombre.split(' ')[0];

  // Cargar datos del alumno desde la sheet
  try {
    const [respAlum, respMem, respAsist] = await Promise.all([
      fetch(WORKER_ALUMNOS),
      fetch(WORKER_MEMBRESIAS),
      fetch(WORKER_ASISTENCIA2)
    ]);
    const rows       = parseCSV(await respAlum.text());
    const pagos      = parseCSV(await respMem.text());
    const asistencias = parseCSV(await respAsist.text());
    const alumno  = rows.find(r => String(r['DNI']||'').trim() === String(user.dni||'').trim());
    // Buscar último pago del alumno
    const misPagos = pagos
      .filter(r => String(r['DNI del Alumno']||'').trim() === String(user.dni||'').trim())
      .sort((a,b) => new Date(b['Fecha de Pago']) - new Date(a['Fecha de Pago']));
    const ultimoPago = misPagos[0] || null;

    if (alumno) {
      const nombre   = String(alumno['Nmbre y Apellido']||'').trim();
      const dni      = String(alumno['DNI']||'').trim();
      const act      = String(alumno['Actividad']||'').trim();
      const horario  = String(alumno['Horario Asignado']||'').trim();
      const historial= String(alumno['Htorial de Actividad Fisica']||'').trim();
      const foto     = fotoUrl(String(alumno['Subir una Foto']||'').trim());
      const ini      = iniciales(nombre);

      // Perfil
      const av = document.getElementById('perfilAvatar');
      if (foto) {
        av.innerHTML = '<img src="'+foto+'" alt="foto" onerror="this.style.display=\'none\';this.parentElement.textContent=\''+ini+'\'" >';
      } else {
        av.textContent = ini;
      }
      document.getElementById('perfilNombre').textContent = nombre || 'Sin nombre';
      document.getElementById('navNombre').textContent = (nombre||'').split(' ')[0];
      document.getElementById('perfilDni').textContent = 'DNI: ' + dni;
      document.getElementById('perfilHistorial').textContent = historial ? '📋 ' + historial : '';
      document.getElementById('perfilActividad').textContent = act || '—';
      document.getElementById('perfilHorario').textContent = horario || '—';

      // Membresía
      renderMembresia(ultimoPago);
      // Historial
      renderHistorial(misPagos);
      // Asistencia del alumno
      const misAsistencias = asistencias.filter(a => {
        const aDni = String(a['DNI Alumno']||'').trim().replace(/\.0$/,'');
        const uDni = String(user.dni||'').trim().replace(/\.0$/,'');
        return aDni === uDni;
      });
      console.log('Asistencias encontradas:', misAsistencias.length, 'DNI buscado:', user.dni);
      window._misAsistencias = misAsistencias;
      verAsistencia('semana');
    }
  } catch(e) {
    console.error(e);
  }
}

function renderHistorial(pagos) {
  const cont = document.getElementById('historialPagos');
  if (!pagos || !pagos.length) {
    cont.innerHTML = '<div class="empty-msg">No hay pagos registrados en los últimos 3 meses.</div>';
    return;
  }

  const hace3meses = new Date();
  hace3meses.setMonth(hace3meses.getMonth() - 3);

  const recientes = pagos.filter(p => {
    const f = new Date(p['Fecha de Pago']||'');
    return f >= hace3meses;
  });

  if (!recientes.length) {
    cont.innerHTML = '<div class="empty-msg">No hay pagos en los últimos 3 meses.</div>';
    return;
  }

  cont.innerHTML = '<table class="historial-tabla"><thead><tr>' +
    '<th>Fecha</th><th>Tipo</th><th>Forma de pago</th><th>Monto</th><th>Estado</th>' +
    '</tr></thead><tbody>' +
    recientes.map(p => {
      const estado = (p['Estado']||'Pendiente').trim();
      const cls = estado.toLowerCase() === 'validado' ? 'h-validado'
                : estado.toLowerCase() === 'rechazado' ? 'h-rechazado' : 'h-pendiente';
      return '<tr>' +
        '<td>' + (p['Fecha de Pago']||'—') + '</td>' +
        '<td>' + (p['Tipo de Membresia']||'—') + '</td>' +
        '<td>' + (p['Forma de Pago']||'—') + '</td>' +
        '<td class="h-monto">$' + parseFloat(p['Monto']||0).toLocaleString('es-AR') + '</td>' +
        '<td><span class="h-badge ' + cls + '"><span class="h-dot"></span>' + estado + '</span></td>' +
        '</tr>';
    }).join('') +
    '</tbody></table>';
}

function renderMembresia(pago) {
  const dot    = document.getElementById('mem-dot');
  const label  = document.getElementById('mem-label');
  const detalle= document.getElementById('mem-detalle');
  const monto  = document.getElementById('mem-monto');
  const vence  = document.getElementById('mem-vence');

  if (!pago) {
    label.textContent   = 'Sin membresía registrada';
    detalle.textContent = 'Consultá con tu instructor para registrar tu pago';
    dot.className = 'mem-dot pendiente';
    return;
  }

  const estado = String(pago['Estado']||'').trim();
  const tipo   = String(pago['Tipo de Membresia']||'').trim();
  const mont   = parseFloat(pago['Monto']||0);
  const fecha  = String(pago['Fecha de Pago']||'').trim();
  const forma  = String(pago['Forma de Pago']||'').trim();

  // Calcular vencimiento según tipo
  let fechaVence = null;
  if (fecha) {
    const d = new Date(fecha);
    if (tipo === 'Mensual')       { d.setMonth(d.getMonth()+1); fechaVence = d; }
    else if (tipo === 'Quincenal'){ d.setDate(d.getDate()+15);  fechaVence = d; }
    else if (tipo === 'Clase suelta'){ fechaVence = new Date(fecha); }
  }

  const hoy    = new Date();
  const vencida = fechaVence && fechaVence < hoy;

  if (estado === 'Pendiente') {
    dot.className     = 'mem-dot pendiente';
    label.textContent = 'Pago pendiente de validación';
    detalle.textContent = tipo + ' — ' + forma + ' — ' + fecha;
  } else if (estado === 'Rechazado') {
    dot.className     = 'mem-dot vencida';
    label.textContent = 'Pago rechazado';
    detalle.textContent = 'Consultá con tu instructor';
  } else if (vencida) {
    dot.className     = 'mem-dot vencida';
    label.textContent = 'Membresía vencida';
    detalle.textContent = tipo + ' — venció el ' + (fechaVence ? fechaVence.toLocaleDateString('es-AR') : '');
  } else {
    dot.className     = 'mem-dot activa';
    label.textContent = 'Membresía activa — ' + tipo;
    detalle.textContent = forma + ' — pagado el ' + fecha;
  }

  monto.textContent = mont > 0 ? '$' + mont.toLocaleString('es-AR') : '';
  vence.textContent = fechaVence && !vencida
    ? 'Vence: ' + fechaVence.toLocaleDateString('es-AR')
    : '';
}

function verAsistencia(periodo) {
  // Actualizar botones
  document.getElementById('btn-semana').style.background = periodo==='semana'?'rgba(58,158,63,0.15)':'var(--surface)';
  document.getElementById('btn-semana').style.color = periodo==='semana'?'#81c784':'var(--text2)';
  document.getElementById('btn-mes').style.background = periodo==='mes'?'rgba(58,158,63,0.15)':'var(--surface)';
  document.getElementById('btn-mes').style.color = periodo==='mes'?'#81c784':'var(--text2)';

  const todas = window._misAsistencias || [];
  const ahora = new Date();
  let desde;
  if (periodo === 'semana') {
    desde = new Date(ahora); desde.setDate(ahora.getDate() - 7);
  } else {
    desde = new Date(ahora.getFullYear(), ahora.getMonth(), 1);
  }

  const parseFecha = f => {
    const p = String(f||'').split('/');
    if (p.length===3) return new Date(p[2],p[1]-1,p[0]);
    return new Date(f);
  };

  const filtradas = todas.filter(a => parseFecha(a['Fecha']) >= desde);
  renderAsistenciaAlumno(filtradas, periodo);
}

function renderAsistenciaAlumno(lista, periodo) {
  const cont = document.getElementById('asistenciaAlumno');
  if (!lista.length) {
    cont.innerHTML = '<div class="empty-msg">No tenés asistencias registradas ' + (periodo==='semana'?'esta semana':'este mes') + '.</div>';
    return;
  }

  // Calcular stats
  const dias = new Set(lista.map(a => a['Fecha'])).size;
  const clases = lista.length;

  cont.innerHTML = '<div class="asist-stats">' +
    '<div class="asist-stat"><strong>' + dias + '</strong>días asistidos</div>' +
    '<div class="asist-stat"><strong>' + clases + '</strong>clases</div>' +
    '</div>' +
    '<div class="asist-grid">' +
    lista.map(a => '<div class="asist-dia presente">' +
      '<div class="asist-fecha">' + (a['Fecha']||'—') + '</div>' +
      '<div class="asist-act">' + (a['Actividad']||'—') + '</div>' +
      '<div class="asist-turno">Turno ' + (a['Turno']||'—') + '</div>' +
      '<div class="asist-hora">' + (a['Hora']||'') + '</div>' +
      '<span class="asist-badge">✓ Presente</span>' +
      '</div>'
    ).join('') +
    '</div>';
}

}
